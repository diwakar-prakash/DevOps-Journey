name: Industry CI

on:
  push:
    branches:
      - main
      - dev
      - staging
    paths:
      - 'Learnings/CI-CD/11-full-system-industry/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Learnings/CI-CD/11-full-system-industry

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Get Changed Files
        id: changes
        run: |
          echo "files=$(git diff --name-only HEAD~1)" >> $GITHUB_OUTPUT

      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build User Service
        if: contains(steps.changes.outputs.files, 'user-service/')
        run: |
          npm --prefix user-service ci
          npm --prefix user-service test
          docker build -t diwakar5041/user-service:${{ github.sha }} user-service
          docker push diwakar5041/user-service:${{ github.sha }}

      - name: Build Product Service
        if: contains(steps.changes.outputs.files, 'product-service/')
        run: |
          npm --prefix product-service ci
          npm --prefix product-service test
          docker build -t diwakar5041/product-service:${{ github.sha }} product-service
          docker push diwakar5041/product-service:${{ github.sha }}

      - name: Build Gateway Service
        if: contains(steps.changes.outputs.files, 'api-gateway/')
        run: |
          npm --prefix api-gateway ci
          npm --prefix api-gateway test
          docker build -t diwakar5041/api-gateway:${{ github.sha }} api-gateway
          docker push diwakar5041/api-gateway:${{ github.sha }}

      - name: Set Environment
        id: env
        run: |
          BRANCH=${GITHUB_REF##*/}
          if [[ "$BRANCH" == "dev" ]]; then
            echo "file=values-dev.yaml" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "staging" ]]; then
            echo "file=values-staging.yaml" >> $GITHUB_OUTPUT
          else
            echo "file=values-prod.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update Deployment Repo
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/diwakar-prakash/DevOps-GitOps-Deployment.git
          cd DevOps-GitOps-Deployment/services/11-full-system-industry

          FILE=${{ steps.env.outputs.file }}

          if echo "${{ steps.changes.outputs.files }}" | grep -q "user-service"; then
            yq -i ".user.tag = \"${{ github.sha }}\"" $FILE
          fi

          if echo "${{ steps.changes.outputs.files }}" | grep -q "product-service"; then
            yq -i ".product.tag = \"${{ github.sha }}\"" $FILE
          fi

          if echo "${{ steps.changes.outputs.files }}" | grep -q "api-gateway"; then
            yq -i ".gateway.tag = \"${{ github.sha }}\"" $FILE
          fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "update image tags" || echo "No changes to commit"
          git push

