name: CI Pipeline 0$ NodeJS CI CD Production

on:
  push:
    branches:
      - main
    paths:
      - 'Learnings/CI-CD/5-nodejs-ci-cd-production/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Learnings/CI-CD/5-nodejs-ci-cd-production

    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Docker image
        run: docker build -t nodejs-ci-cd-production:${{ github.sha }} .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 211125333487.dkr.ecr.us-east-1.amazonaws.com

      - name: Tag Docker image (SHA)
        run: |
          docker tag nodejs-ci-cd-production:${{ github.sha }} \
          211125333487.dkr.ecr.us-east-1.amazonaws.com/nodejs-ci-cd-production:${{ github.sha }}

      - name: Tag Docker image (latest)
        run: |
          docker tag nodejs-ci-cd-production:${{ github.sha }} \
          211125333487.dkr.ecr.us-east-1.amazonaws.com/nodejs-ci-cd-production:latest

      - name: Push to ECR
        run: |
          docker push 211125333487.dkr.ecr.us-east-1.amazonaws.com/nodejs-ci-cd-production:${{ github.sha }}
          docker push 211125333487.dkr.ecr.us-east-1.amazonaws.com/nodejs-ci-cd-production:latest

      - name: Clone GitOps repo
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/diwakar-prakash/DevOps-GitOps-Deployments.git

      - name: Update image tag
        run: |
          cd DevOps-GitOps-Deployments/services/5-nodejs-ci-cd-production
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" values.yaml

      - name: Commit and push changes
        run: |
          cd DevOps-GitOps-Deployments
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push

