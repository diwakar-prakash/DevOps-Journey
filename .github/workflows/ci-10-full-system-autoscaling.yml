name: Simple CI

on:
  push:
    branches:
      - main
    paths:
      - 'Learnings/CI-CD/10-full-system-autoscaling/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Learnings/CI-CD/10-full-system-autoscaling

    steps:
      - name: Checking
        uses: actions/checkout@v3

      - name: Node 
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Test of user-secrets
        run: |
          npm --prefix user-service ci
          npm --prefix user-service test

      - name: Build and Push user-service
        run: |
          docker build -t diwakar5041/user-service:${{ .github.sha }} user-service
          docker push diwakar5041/user-service:${{ github.sha }}

      - name: Test of product-service
        run: |
          npm --prefix product-service ci
          npm --prefix product-service test

      - name: Build and Push product-service
        run: |
          docker build -t diwakar5041/product-service:${{ .github.sha }} product-service
          docker push diwakar5041/product-service:${{ .github.sha }}

      - name: Test of api-gateway
        run: |
          npm --prefix api-gateway ci
          npm --prefix api-gateway test

      - name: Build and Push api-gateway
        run: |
          docker build -t diwakar5041/api-gateway:${{ .github.sha }} api-gateway
          docker push diwakar5041/api-gateway:${{ .github.sha }}

      - name: Update Helm Values
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/diwakar-prakash/DevOps-GitOps-Deployments.git
          cd DevOps-GitOps-Deployments/services/10-full-system-autoscaling

          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' values-prod.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add values-prod.yaml
          git commit -m "update prod image to ${{ github.sha }}"
          git push

