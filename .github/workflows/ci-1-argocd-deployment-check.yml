name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Learnings/CI-CD/4-gitops-node-app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Learnings/CI-CD/4-gitops-node-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t diwakar5041/gitops-node-app:${{ github.sha }} .

      - name: Push Image
        run: docker push diwakar5041/gitops-node-app:${{ github.sha }}

      - name: Update Helm values
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/diwakar-prakash/DevOps-GitOps-Deployments.git
          cd DevOps-GitOps-Deployments/services/4-gitops-node-app

          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' values.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "update image tag to ${{ github.sha }}"
          git push

