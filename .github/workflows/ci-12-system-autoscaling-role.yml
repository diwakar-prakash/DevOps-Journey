name: Production CI Level 3

on:
  push:
    branches: [main, dev, staging]

    paths:
      - 'Learnings/CI-CD/12-system-autoscaling-role/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      user: ${{ steps.filter.outputs.user }}
      product: ${{ steps.filter.outputs.product }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user:
              - 'Learnings/CI-CD/12-system-autoscaling-role/user-service/**'
            product:
              - 'Learnings/CI-CD/12-system-autoscaling-role/product-service/**'
            gateway:
              - 'Learnings/CI-CD/12-system-autoscaling-role/api-gateway/**'

  user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user == "true"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Learnings/CI-CD/12-system-autoscaling-role/user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm audit --audit-level=high || true
      - name: Login to Docker
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      - name: Build and Push
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE