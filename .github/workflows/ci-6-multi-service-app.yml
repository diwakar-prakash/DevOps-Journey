name: Multi-Service CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Learnings/CI-CD/6-multi-service-app/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Learnings/CI-CD/6-multi-service-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # ab, we are going to login to dockerhub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # user-service ko uddate hai
      - name: Test User Service
        run: |
          npm --prefix user-service ci
          npm --prefix user-service test

      - name: Build and Push the Image of user-service
        run: |
          docker build -t diwakar5041/user-service:${{ github.sha }} user-service
          docker push diwakar5041/user-service:${{ github.sha }} 

      # we are going to do product-service operation now
      - name: Test Product Service
        run: |
          npm --prefix product-service ci
          npm --prefix product-service test

      - name: build and push the Image of product-service
        run: |
          docker build -t diwakar5041/product-service:${{ github.sha }} product-service    
          docker push diwakar5041/product-service:${{ github.sha }}

      # ab, we will do the api-gateway
      - name: test api gateway
        run: |
          npm --prefix api-gateway ci
          npm --prefix api-gateway test

      - name: build and push the image of api gateway
        run: |
          docker build -t diwakar5041/api-gateway:${{ github.sha }} api-gateway
          docker push diwakar5041/api-gateway:${{ github.sha }}

      # Ab helm par update karenge. And then argocd will deploy it
      - name: Update Helm Values
        run: |
          git clone https://${{ secrets.GH_TOKEN }}@github.com/diwakar-prakash/DevOps-GitOps-Deployments.git
          cd DevOps-GitOps-Deployments/services/6-multi-service-app

          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' values.yaml
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "update all service images to ${{ github.sha }}"
          git push   

